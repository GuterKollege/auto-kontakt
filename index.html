<!--
  NFC-Kontaktformular fuers Auto
  ================================
  Backend: FormSubmit.co (kostenlos, kein Account noetig).
  Die Meldungen inkl. optionalem Foto kommen als E-Mail an die im
  <form action="..."> hinterlegte Adresse.

  WICHTIG - einmalige Aktivierung:
  Bei der allerersten Uebermittlung schickt FormSubmit eine
  "Activate Form"-E-Mail an die Empfangsadresse. Den Link darin einmal
  anklicken - erst danach werden Meldungen zugestellt.

  Foto-Uploads funktionieren bei FormSubmit nur ueber einen klassischen
  Formular-POST (multipart/form-data). Damit die Seite waehrend des
  Uploads nicht "haengt", postet das Formular in ein verstecktes iframe
  (target=fs_frame): waehrenddessen laeuft ein Spinner und der Button ist
  grau; nach Abschluss leitet JS auf danke.html weiter.

  Mehrere NFC-Chips:
  Eine einzige Seite bedient alle Chips. Der Chip wird ueber ?tag=<key>
  unterschieden, die Zuordnung Chip -> Empfaengeradresse steht unten im
  Skript in der TAGS-Konstante. Ohne/mit unbekanntem Parameter geht die
  Meldung an DEFAULT_TAG, damit nie eine Meldung verloren geht.

  Hosting: Ordner auf GitHub Pages / Cloudflare Pages hochladen.
  Den Link dann per "NFC Tools"-App auf den NFC-Tag schreiben.
-->
<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Schaden gemeldet</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card-bg: #ffffff;
    --text: #1a1d23;
    --muted: #6b7280;
    --accent: #d64545;
    --accent-dark: #b83636;
    --border: #e2e4e9;
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15171c;
      --card-bg: #1f2229;
      --text: #f0f1f3;
      --muted: #9aa0ac;
      --accent: #e2574f;
      --accent-dark: #c8453e;
      --border: #2c3038;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 24px 16px 60px;
  }
  .card {
    width: 100%;
    max-width: 460px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  h1 {
    font-size: 1.4rem;
    margin: 0 0 6px;
  }
  p.sub {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.4;
  }
  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    margin: 18px 0 6px;
  }
  input[type="text"],
  input[type="tel"],
  textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 1rem;
    font-family: inherit;
  }
  textarea { min-height: 90px; resize: vertical; }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .photo-buttons {
    display: flex;
    gap: 10px;
  }
  .photo-btn {
    flex: 1;
    margin-top: 0;
    padding: 12px 10px;
    border-radius: 10px;
    border: 1px dashed var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
  }
  .photo-btn:active { background: var(--border); }
  .file-status {
    display: none;
    align-items: center;
    gap: 10px;
    margin: 10px 2px 0;
    color: var(--muted);
    font-size: 0.85rem;
  }
  .file-status .name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .spinner {
    flex: 0 0 auto;
    width: 18px;
    height: 18px;
    border: 3px solid rgba(59, 130, 246, 0.25);
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .remove-btn {
    flex: 0 0 auto;
    width: auto;
    margin: 0 0 0 auto;
    padding: 6px 10px;
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
  }
  button.submit {
    margin-top: 26px;
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
  }
  button.submit:active { background: var(--accent-dark); }
  button.submit.is-sending {
    background: var(--muted);
    cursor: default;
    pointer-events: none;
  }
  .error {
    display: none;
    color: var(--accent);
    font-size: 0.9rem;
    margin-top: 12px;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Schaden am Auto bemerkt?</h1>
    <p class="sub">Danke, dass du dich meldest. Bitte fuelle die Felder aus &mdash; ich melde mich dann so schnell wie moeglich bei dir.</p>

    <form id="damageForm" action="https://formsubmit.co/toni-kusmierz@web.de" method="POST" enctype="multipart/form-data" target="fs_frame">
      <!-- FormSubmit-Steuerfelder -->
      <input type="hidden" name="_subject" id="subjectField" value="Neue Schadensmeldung ueber NFC-Formular" />
      <input type="hidden" name="_template" value="table" />
      <input type="hidden" name="_captcha" value="false" />
      <!-- Wert wird beim Laden dynamisch gesetzt (siehe Skript), damit eine
           Umbenennung von Account/Repo die Weiterleitung nicht bricht. -->
      <input type="hidden" name="_next" id="nextField" value="" />
      <input type="text" name="_honey" style="display:none" tabindex="-1" autocomplete="off" />

      <label for="name">Dein Name *</label>
      <input type="text" id="name" name="Name" required autocomplete="name" />

      <label for="phone">Deine Telefonnummer *</label>
      <input type="tel" id="phone" name="Telefonnummer" required autocomplete="tel"
             inputmode="tel" pattern="[+0-9()/\s-]{7,25}"
             title="Bitte eine gueltige Telefonnummer eingeben." />

      <label for="message">Was ist passiert? *</label>
      <textarea id="message" name="Beschreibung" required placeholder="z.B. beim Ausparken den hinteren Kotfluegel gestreift"></textarea>

      <label>Foto vom Schaden</label>
      <div class="photo-buttons">
        <button type="button" class="photo-btn" id="cameraBtn">📷 Foto aufnehmen</button>
      </div>
      <input type="file" id="cameraTemp" accept="image/*" capture="environment" style="display:none" />
      <input type="file" id="photo" name="attachment" accept="image/*" style="display:none" />
      <div class="file-status" id="fileStatusRow">
        <span class="name" id="fileStatus"></span>
        <span class="spinner" id="uploadSpinner" style="display:none"></span>
        <button type="button" class="remove-btn" id="removePhoto">&#10005; entfernen</button>
      </div>

      <button type="submit" class="submit" id="submitBtn">Absenden</button>
      <p class="error" id="errorMsg">Das Senden hat sehr lange gedauert. Bitte pruefe deine Internetverbindung und versuch es noch einmal.</p>
    </form>
  </div>

  <!-- Verstecktes Ziel: Formular sendet im Hintergrund hierhin, die Seite bleibt stehen. -->
  <iframe name="fs_frame" id="fs_frame" title="Versand" style="display:none"></iframe>

  <script>
    // ------------------------------------------------------------------
    // NFC-Chip-Konfiguration
    // Jeder Chip bekommt eine eigene URL mit ?tag=<schluessel>, z.B.
    //   https://crashreport-note.github.io/auto-kontakt/?tag=auto2
    // Ohne Parameter (oder bei unbekanntem/noch leerem Tag) geht die
    // Meldung an DEFAULT_TAG - so geht nie eine Meldung verloren.
    // ------------------------------------------------------------------
    const TAGS = {
      auto1: { email: "toni-kusmierz@web.de" },
      auto2: { email: "" }, // TODO: Empfaengeradresse eintragen
      auto3: { email: "" }, // TODO: Empfaengeradresse eintragen
      auto4: { email: "" }  // TODO: Empfaengeradresse eintragen
    };
    const DEFAULT_TAG = "auto1";

    (function applyTag() {
      const key = new URLSearchParams(location.search).get("tag");
      const entry = TAGS[key];
      const isKnown = !!(entry && entry.email);
      const activeKey = isKnown ? key : DEFAULT_TAG;
      const email = isKnown ? entry.email : TAGS[DEFAULT_TAG].email;
      document.getElementById("damageForm").action = "https://formsubmit.co/" + email;
      document.getElementById("subjectField").value =
        "Neue Schadensmeldung (" + activeKey + ")";
    })();

    const photoInput = document.getElementById("photo");
    const cameraTemp = document.getElementById("cameraTemp");
    const fileStatus = document.getElementById("fileStatus");
    const fileStatusRow = document.getElementById("fileStatusRow");

    document.getElementById("cameraBtn").addEventListener("click", () => cameraTemp.click());

    function adoptFile(tempInput) {
      if (tempInput.files && tempInput.files[0]) {
        const dt = new DataTransfer();
        dt.items.add(tempInput.files[0]);
        photoInput.files = dt.files;
        fileStatus.textContent = tempInput.files[0].name;
        fileStatusRow.style.display = "flex";
      }
    }
    cameraTemp.addEventListener("change", () => adoptFile(cameraTemp));

    document.getElementById("removePhoto").addEventListener("click", () => {
      photoInput.value = "";
      cameraTemp.value = "";
      fileStatus.textContent = "";
      fileStatusRow.style.display = "none";
    });

    // Telefonnummer-Plausibilitaet: erlaubte Zeichen + 7-15 echte Ziffern.
    const phone = document.getElementById("phone");
    function validatePhone() {
      const raw = phone.value.trim();
      const digits = raw.replace(/\D/g, "");
      const ok = raw === "" || (/^\+?[0-9()/\s-]+$/.test(raw) && digits.length >= 7 && digits.length <= 15);
      // Neutrale Meldung ohne Hinweis auf die konkreten Pruefregeln.
      phone.setCustomValidity(ok ? "" : "Bitte eine gueltige Telefonnummer eingeben.");
    }
    phone.addEventListener("input", validatePhone);
    phone.addEventListener("blur", validatePhone);

    // Hintergrund-Versand: Formular postet in das versteckte iframe, damit die
    // Seite nicht "haengt". Waehrenddessen Spinner + grauer Button; nach
    // Abschluss (iframe geladen) Weiterleitung auf die Danke-Seite.
    // Relativ zur aktuellen Seite aufgeloest -> unabhaengig von Domain/Repo-Name.
    const DANKE_URL = new URL("danke.html", location.href).href;
    document.getElementById("nextField").value = DANKE_URL;
    const form = document.getElementById("damageForm");
    const submitBtn = document.getElementById("submitBtn");
    const uploadSpinner = document.getElementById("uploadSpinner");
    const removeBtn = document.getElementById("removePhoto");
    const errorMsg = document.getElementById("errorMsg");
    const fsFrame = document.getElementById("fs_frame");
    let submitting = false;
    let watchdog = null;

    form.addEventListener("submit", (e) => {
      // Bei Ungueltigkeit feuert submit nicht (Browser blockt vorher); hier ist
      // das Formular also gueltig. Nur Doppel-Absenden verhindern.
      if (submitting) { e.preventDefault(); return; }
      submitting = true;
      errorMsg.style.display = "none";
      submitBtn.classList.add("is-sending");
      submitBtn.textContent = "Wird gesendet...";
      if (photoInput.files.length > 0) {
        uploadSpinner.style.display = "inline-block";
        removeBtn.style.display = "none";
      }
      // Sicherheitsnetz, falls die Antwort nie kommt.
      watchdog = setTimeout(() => {
        if (!submitting) return;
        submitting = false;
        submitBtn.classList.remove("is-sending");
        submitBtn.textContent = "Absenden";
        uploadSpinner.style.display = "none";
        if (photoInput.files.length > 0) removeBtn.style.display = "inline-block";
        errorMsg.style.display = "block";
      }, 90000);
      // kein preventDefault -> Formular sendet in das iframe
    });

    // Feuert nach Abschluss des Versands (FormSubmit leitet im iframe auf _next).
    fsFrame.addEventListener("load", () => {
      if (!submitting) return; // ignoriert den initialen about:blank-Load
      clearTimeout(watchdog);
      window.location.href = DANKE_URL;
    });
  </script>
</body>
</html>
