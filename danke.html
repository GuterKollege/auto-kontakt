<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Danke fuer deine Nachricht</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card-bg: #ffffff;
    --text: #1a1d23;
    --muted: #6b7280;
    --border: #e2e4e9;
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15171c;
      --card-bg: #1f2229;
      --text: #f0f1f3;
      --muted: #9aa0ac;
      --border: #2c3038;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  .card {
    width: 100%;
    max-width: 460px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    text-align: center;
  }
  .check {
    font-size: 3rem;
    line-height: 1;
    margin-bottom: 12px;
  }
  h1 { font-size: 1.4rem; margin: 0 0 10px; }
  p { margin: 0; color: var(--muted); font-size: 0.98rem; line-height: 1.5; }
</style>
</head>
<body>
  <div class="card">
    <div class="check">&#10003;</div>
    <h1>Danke fuer deine Nachricht!</h1>
    <p>Deine Angaben sind bei mir angekommen &mdash; ich melde mich so schnell wie moeglich bei dir.</p>
  </div>
</body>
</html>
